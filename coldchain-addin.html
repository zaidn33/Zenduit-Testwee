<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ColdChain Rx Monitor</title>
<style>
  #root { font-family: Arial, Helvetica, sans-serif; padding: 16px; color: #1a1a1a; }
  .cc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .cc-header h1 { font-size: 18px; margin: 0; }
  .cc-range { font-size: 13px; }
  .cc-range input { width: 50px; margin: 0 4px; }
  .cc-banner { background: #fff8e1; border: 1px solid #ffd54f; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
  .cc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .cc-card { border-radius: 6px; padding: 12px; border: 1px solid #ddd; }
  .cc-card.cc-safe { border-color: #4caf50; background: #f1f8f1; }
  .cc-card.cc-alert { border-color: #e53935; background: #fdecea; }
  .cc-card.cc-unknown { border-color: #bbb; background: #f5f5f5; }
  .cc-card-name { font-weight: bold; margin-bottom: 4px; font-size: 13px; }
  .cc-card-temp { font-size: 22px; margin-bottom: 4px; }
  .cc-card-status { font-size: 11px; text-transform: uppercase; margin-bottom: 6px; color: #555; }
  .cc-card-source { font-size: 11px; color: #888; }
  .cc-card svg { display: block; margin-top: 4px; color: #777; }
  h2 { font-size: 15px; margin: 0 0 8px; }
  table#ccLog { width: 100%; border-collapse: collapse; font-size: 12px; }
  table#ccLog th, table#ccLog td { border-bottom: 1px solid #ddd; padding: 6px 8px; text-align: left; }
</style>
</head>
<body>
<div id="root">
  <div class="cc-header">
    <h1>ColdChain Rx Monitor</h1>
    <div class="cc-range">
      Safe range (deg C): <input id="ccMin" type="number" value="2" step="0.5"> to <input id="ccMax" type="number" value="8" step="0.5">
    </div>
  </div>
  <div id="ccBanner" class="cc-banner" style="display:none;"></div>
  <div id="ccGrid" class="cc-grid"></div>
  <h2>Excursion log</h2>
  <table id="ccLog">
    <thead><tr><th>Time</th><th>Vehicle</th><th>Temp (deg C)</th><th>Safe range</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
  window.geotab = window.geotab || { addin: {} };

  geotab.addin.coldChainRx = function () {
    "use strict";

    var cc = {
      minSafe: 2,
      maxSafe: 8,
      devices: {},
      pollTimer: null,
      maxDevices: 20
    };

    function fmt(n) { return Math.round(n * 10) / 10; }

    function nextSimTemp(prevTemp) {
      var base = (prevTemp === undefined) ? (cc.minSafe + cc.maxSafe) / 2 : prevTemp;
      var drift = (Math.random() - 0.5) * 1.0;
      var excursion = Math.random() < 0.06 ? (Math.random() < 0.5 ? -3.5 : 3.5) : 0;
      return fmt(base + drift + excursion);
    }

    function sparkline(history) {
      if (history.length < 2) { return ''; }
      var temps = history.map(function (h) { return h.temp; });
      var min = Math.min.apply(null, temps);
      var max = Math.max.apply(null, temps);
      var range = (max - min) || 1;
      var w = 130, h = 28;
      var pts = temps.map(function (t, i) {
        var x = (i / (temps.length - 1)) * w;
        var y = h - ((t - min) / range) * h;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      return '<svg width="' + w + '" height="' + h + '"><polyline points="' + pts + '" fill="none" stroke="currentColor" stroke-width="2"/></svg>';
    }

    function logExcursion(deviceName, temp) {
      var tbody = document.querySelector('#ccLog tbody');
      var row = document.createElement('tr');
      row.innerHTML =
        '<td>' + new Date().toLocaleString() + '</td>' +
        '<td>' + deviceName + '</td>' +
        '<td>' + temp + '</td>' +
        '<td>' + cc.minSafe + ' to ' + cc.maxSafe + '</td>';
      tbody.insertBefore(row, tbody.firstChild);
    }

    function renderGrid() {
      var grid = document.getElementById('ccGrid');
      if (!grid) { return; }
      grid.innerHTML = '';
      Object.keys(cc.devices).forEach(function (id) {
        var d = cc.devices[id];
        var last = d.history.length ? d.history[d.history.length - 1] : null;
        var temp = last ? last.temp : null;
        var safe = temp !== null && temp >= cc.minSafe && temp <= cc.maxSafe;
        var card = document.createElement('div');
        card.className = 'cc-card ' + (temp === null ? 'cc-unknown' : (safe ? 'cc-safe' : 'cc-alert'));
        card.innerHTML =
          '<div class="cc-card-name">' + d.name + '</div>' +
          '<div class="cc-card-temp">' + (temp === null ? '...' : temp + ' deg C') + '</div>' +
          '<div class="cc-card-status">' + (temp === null ? 'No data yet' : (safe ? 'Safe' : 'Out of range')) + '</div>' +
          sparkline(d.history) +
          '<div class="cc-card-source">' + (d.simulated ? 'Simulated reading' : 'Live sensor') + '</div>';
        grid.appendChild(card);
      });
    }

    function findTemperatureDiagnostics(api, deviceIds, onDone) {
      var to = new Date();
      var from = new Date(to.getTime() - 60 * 60 * 1000);
      var calls = deviceIds.map(function (id) {
        return ['Get', { typeName: 'StatusData', search: { fromDate: from.toISOString(), toDate: to.toISOString(), deviceSearch: { id: id } } }];
      });
      api.multiCall(calls, function (results) {
        var diagIds = {};
        (results || []).forEach(function (rows) {
          (rows || []).forEach(function (row) {
            if (row.diagnostic && row.diagnostic.id) { diagIds[row.diagnostic.id] = true; }
          });
        });
        var ids = Object.keys(diagIds);
        if (!ids.length) { onDone([]); return; }
        api.multiCall(ids.map(function (id) { return ['Get', { typeName: 'Diagnostic', search: { id: id } }]; }), function (diagResults) {
          var tempIds = [];
          (diagResults || []).forEach(function (arr, i) {
            var diag = arr && arr[0];
            if (diag && diag.name && diag.name.toLowerCase().indexOf('temperature') !== -1) {
              tempIds.push(ids[i]);
            }
          });
          onDone(tempIds);
        }, function () { onDone([]); });
      }, function () { onDone([]); });
    }

    function poll(api) {
      var ids = Object.keys(cc.devices);
      if (!ids.length) { return; }

      findTemperatureDiagnostics(api, ids, function (tempDiagIds) {
        if (!tempDiagIds.length) {
          ids.forEach(function (id) {
            var d = cc.devices[id];
            var prev = d.history.length ? d.history[d.history.length - 1].temp : undefined;
            var temp = nextSimTemp(prev);
            d.simulated = true;
            d.history.push({ t: new Date(), temp: temp });
            if (d.history.length > 40) { d.history.shift(); }
            if (temp < cc.minSafe || temp > cc.maxSafe) { logExcursion(d.name, temp); }
          });
          renderGrid();
          return;
        }

        var to = new Date();
        var from = new Date(to.getTime() - 15 * 60 * 1000);
        var calls = ids.map(function (id) {
          return ['Get', { typeName: 'StatusData', search: { fromDate: from.toISOString(), toDate: to.toISOString(), deviceSearch: { id: id }, diagnosticSearch: { id: tempDiagIds[0] } } }];
        });
        api.multiCall(calls, function (results) {
          ids.forEach(function (id, i) {
            var d = cc.devices[id];
            var rows = (results && results[i]) || [];
            var temp;
            if (rows.length) {
              var latest = rows[rows.length - 1];
              d.simulated = false;
              temp = fmt(latest.data);
              d.history.push({ t: new Date(latest.dateTime), temp: temp });
            } else {
              var prev = d.history.length ? d.history[d.history.length - 1].temp : undefined;
              d.simulated = true;
              temp = nextSimTemp(prev);
              d.history.push({ t: new Date(), temp: temp });
            }
            if (d.history.length > 40) { d.history.shift(); }
            if (temp < cc.minSafe || temp > cc.maxSafe) { logExcursion(d.name, temp); }
          });
          renderGrid();
        }, function () { renderGrid(); });
      });
    }

    return {
      initialize: function (api, pageState, callback) {
        var minInput = document.getElementById('ccMin');
        var maxInput = document.getElementById('ccMax');
        minInput.addEventListener('change', function (e) { cc.minSafe = parseFloat(e.target.value); });
        maxInput.addEventListener('change', function (e) { cc.maxSafe = parseFloat(e.target.value); });

        api.call('Get', { typeName: 'Device', search: { fromDate: new Date().toISOString() } }, function (devices) {
          (devices || []).slice(0, cc.maxDevices).forEach(function (d) {
            cc.devices[d.id] = { name: d.name, history: [], simulated: true };
          });
          var banner = document.getElementById('ccBanner');
          banner.style.display = 'block';
          banner.textContent = 'Checking for a live temperature diagnostic. Falls back to simulated readings if none is found, so the dashboard always shows something while testing.';
          poll(api);
          cc.pollTimer = setInterval(function () { poll(api); }, 30000);
          callback();
        }, function (err) {
          console.error('ColdChain Rx: failed to load devices', err);
          callback();
        });
      },
      focus: function () { renderGrid(); },
      blur: function () { if (cc.pollTimer) { clearInterval(cc.pollTimer); cc.pollTimer = null; } }
    };
  };
</script>
</body>
</html>
